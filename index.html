<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>江の島ごみゼロ・マップ</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        /* モダンなデザイン設定 */
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* 現在地ボタン */
        .locate-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 12px 20px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 14px;
        }
        .locate-button:active { background: #27ae60; transform: scale(0.95); }

        /* ごみ箱アイコン（絵文字） */
        .trash-icon { font-size: 24px; text-align: center; line-height: 1; }

        /* ポップアップをモダンに */
        .leaflet-popup-content-wrapper {
            background: #333;
            color: #fff;
            border-radius: 12px;
            padding: 5px;
        }
        .leaflet-popup-tip { background: #333; }
    </style>
</head>
<body>

    <button class="locate-button" onclick="locateUser()">📍 現在地を追跡</button>
    <div id="map"></div>

    <script>
        // 1. 地図の初期設定（江の島を中心に表示）
        const map = L.map('map').setView([35.2995, 139.4790], 16);

        // 2. モダンな黒背景タイルを読み込む
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // 3. ごみ箱アイコンの設定
        const trashIcon = L.divIcon({
            html: '<div class="trash-icon">🗑️</div>',
            className: 'custom-div-icon',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        // 4. 司令官が調べたごみ箱データ（直接埋め込み！）
        const geojsonData = {
            "type": "FeatureCollection",
            "features": [
                {"type":"Feature","properties":{"name":"ごみ箱候補地 1"},"geometry":{"coordinates":[139.48059756903626,35.30053393086112],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 2"},"geometry":{"coordinates":[139.48055987413773,35.29982953600225],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 3"},"geometry":{"coordinates":[139.4801433007906,35.299048407428714],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 4"},"geometry":{"coordinates":[139.47754903777434,35.29965363736069],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 5"},"geometry":{"coordinates":[139.4761930611304,35.299117986374625],"type":"Point"}}
            ]
        };

        // 地図にデータを追加
        L.geoJSON(geojsonData, {
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, {icon: trashIcon});
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.name) {
                    layer.bindPopup("<b>" + feature.properties.name + "</b><br>江の島を綺麗にしよう！");
                }
            }
        }).addTo(map);

        // 5. ライブ位置情報システム
        let locationMarker, locationCircle;

        function locateUser() {
            // watch: true で移動を追いかけ続けるよ！
            map.locate({
                watch: true, 
                setView: true, 
                maxZoom: 18,
                enableHighAccuracy: true
            });
        }

        map.on('locationfound', function(e) {
            const radius = e.accuracy / 2;

            if (locationMarker) {
                map.removeLayer(locationMarker);
                map.removeLayer(locationCircle);
            }

            // 現在地の青い丸（ライブで動く！）
            locationMarker = L.circleMarker(e.latlng, {
                color: '#2ecc71',
                fillColor: '#2ecc71',
                fillOpacity: 1,
                radius: 7,
                weight: 3
            }).addTo(map).bindPopup("司令官、現在地に到着！");

            locationCircle = L.circle(e.latlng, radius, {
                color: '#2ecc71',
                fillOpacity: 0.1,
                weight: 1
            }).addTo(map);
        });

        map.on('locationerror', function(e) {
            alert("位置情報が取得できなかったよ。設定を確認してみてね！");
        });
    </script>
</body>
</html>
