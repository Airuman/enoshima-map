<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>江の島ごみゼロ・マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* UIボタンの配置 */
        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 10px 15px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-theme { background: #34495e; color: white; }
        .btn-locate { background: #2ecc71; color: white; }

        .trash-icon { font-size: 24px; text-align: center; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn btn-theme" onclick="toggleTheme()">🌓 テーマ切替</button>
        <button class="btn btn-locate" onclick="locateUser()">📍 現在地を追跡</button>
    </div>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([35.2995, 139.4790], 16);

        // --- テーマ設定 ---
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        });

        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        });

        // デフォルトは「ライト」にするよ
        lightTiles.addTo(map);
        let isDark = false;

        function toggleTheme() {
            if (isDark) {
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
                isDark = false;
            } else {
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
                isDark = true;
            }
        }

        // --- ごみ箱データ ---
        const trashIcon = L.divIcon({
            html: '<div class="trash-icon">🗑️</div>',
            className: 'custom-div-icon',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        const geojsonData = {
            "type": "FeatureCollection",
            "features": [
                {"type":"Feature","properties":{"name":"ごみ箱候補地 1"},"geometry":{"coordinates":[139.48059756903626,35.30053393086112],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 2"},"geometry":{"coordinates":[139.48055987413773,35.29982953600225],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 3"},"geometry":{"coordinates":[139.4801433007906,35.299048407428714],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 4"},"geometry":{"coordinates":[139.47754903777434,35.29965363736069],"type":"Point"}},
                {"type":"Feature","properties":{"name":"ごみ箱候補地 5"},"geometry":{"coordinates":[139.4761930611304,35.299117986374625],"type":"Point"}}
            ]
        };

        L.geoJSON(geojsonData, {
            pointToLayer: (f, l) => L.marker(l, {icon: trashIcon}),
            onEachFeature: (f, layer) => layer.bindPopup("<b>" + f.properties.name + "</b>")
        }).addTo(map);

        // --- 位置情報 ---
        let locationMarker, locationCircle;
        function locateUser() {
            map.locate({watch: true, setView: true, maxZoom: 18, enableHighAccuracy: true});
        }

        map.on('locationfound', function(e) {
            if (locationMarker) { map.removeLayer(locationMarker); map.removeLayer(locationCircle); }
            locationMarker = L.circleMarker(e.latlng, { color: '#2ecc71', fillColor: '#2ecc71', fillOpacity: 1, radius: 7 }).addTo(map);
            locationCircle = L.circle(e.latlng, e.accuracy / 2, { color: '#2ecc71', fillOpacity: 0.1 }).addTo(map);
        });
    </script>
</body>
</html>
